name: CI (Laravel + MySQL)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      BROADCAST_CONNECTION: log
      BROADCAST_DRIVER: log

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 🐘 Setup PHP
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo, pdo_mysql
          coverage: none

      # 🟢 Setup Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 📦 Install Composer dependencies
      - name: 📦 Install Composer deps
        run: composer install --no-interaction --prefer-dist

      # 📦 Install NPM dependencies
      - name: 📦 Install NPM deps
        run: npm install

      # 🏗️ Build frontend assets
      - name: 🏗️ Build assets
        run: npm run build

      # 🧪 Prepare Laravel environment
      - name: 🧪 Prepare Laravel env
        run: |
          cp .env.example .env
          php artisan key:generate

      # ⏳ Wait for MySQL
      - name: ⏳ Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -ularavel -psecret && break
            sleep 2
          done

      # 🗄️ Run migrations
      - name: 🗄️ Migrate
        run: php artisan migrate --force

      # ✅ Run tests
      - name: ✅ Run tests
        run: php artisan test