name: Deploy Testing (Local)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-orbit-testing
  cancel-in-progress: true

jobs:
  deploy_testing:
    runs-on: [self-hosted, orbit-testing]
    env:
      APP_DIR: /var/app/orbit
      CONTAINER: orbit
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Show server details
        shell: bash
        run: |
          echo "=============================="
          echo "🚀 Deploy running on:"
          echo "Hostname: $(hostname)"
          echo "Public/Private IP:"
          hostname -I
          echo "=============================="
        shell: bash
        run: |
          set -euo pipefail
          test -f /root/.ssh/orbit_deploy_key || (echo "Missing /root/.ssh/orbit_deploy_key" && exit 1)
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/orbit_deploy_key
          if [ ! -f /root/.ssh/known_hosts ]; then
            ssh-keyscan -H github.com > /root/.ssh/known_hosts
          else
            grep -q "github.com" /root/.ssh/known_hosts || ssh-keyscan -H github.com >> /root/.ssh/known_hosts
          fi
          chmod 644 /root/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i /root/.ssh/orbit_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts"

      - name: Switch origin to SSH (workspace)
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin develop

      - name: Update live code (reset to origin/develop)
        shell: bash
        run: |
          set -euo pipefail
          test -d "$APP_DIR/.git" || (echo "ERROR: $APP_DIR is not a git repo (missing .git)" && exit 1)
          git config --global --add safe.directory "$APP_DIR"
          cd "$APP_DIR"
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin develop
          git reset --hard origin/develop
          git clean -fd

      - name: Install PHP dependencies
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader"

      - name: Install Node dependencies
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm ci"

      - name: Build frontend assets
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm run build"

      - name: Optimize Laravel
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && php artisan optimize:clear"

      - name: Deploy finished
        run: echo "Deploy done on testing server!"