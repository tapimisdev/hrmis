name: Deploy (Self-hosted)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-orbit-testing
  cancel-in-progress: true

jobs:
  deploy_testing:
    runs-on: [self-hosted, orbit-testing]
    env:
      APP_DIR: /var/app/orbit
      CONTAINER: orbit
      SSH_DIR: ${{ runner.temp }}/ssh
      SSH_KEY: ${{ runner.temp }}/ssh/orbit_deploy_key
      KNOWN_HOSTS: ${{ runner.temp }}/ssh/known_hosts

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix Git safe directories
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$APP_DIR"

      - name: Setup SSH for GitHub (deploy key)
        shell: bash
        run: |
          set -euo pipefail

          # Make a private ssh folder for THIS job
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          # Your key must exist INSIDE the runner container somewhere.
          # If your key is currently in /root/.ssh, copy it from there (only if it exists).
          test -f /root/.ssh/orbit_deploy_key || (echo "Missing /root/.ssh/orbit_deploy_key inside runner" && exit 1)
          cp /root/.ssh/orbit_deploy_key "$SSH_KEY"
          chmod 600 "$SSH_KEY"

          ssh-keyscan -H github.com > "$KNOWN_HOSTS"
          chmod 644 "$KNOWN_HOSTS"

          git config --global core.sshCommand "ssh -i $SSH_KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$KNOWN_HOSTS"

      - name: Switch origin to SSH (workspace)
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin develop

      - name: Update live code (reset to origin/develop)
        shell: bash
        run: |
          set -euo pipefail
          test -d "$APP_DIR/.git" || (echo "ERROR: $APP_DIR is not a git repo (missing .git)" && exit 1)

          cd "$APP_DIR"
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin develop
          git reset --hard origin/develop
          git clean -fd

      - name: Install PHP dependencies
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader"

      - name: Install Node dependencies
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm ci"

      - name: Build frontend assets
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm run build"

      - name: Optimize Laravel
        shell: bash
        run: docker exec "$CONTAINER" bash -lc "cd /var/www/html && php artisan optimize:clear"

      - name: Deploy finished
        run: echo "Deploy done testing server"