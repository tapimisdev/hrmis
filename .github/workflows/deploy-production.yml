name: Deploy Production (Local)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, orbit2]

    env:
      APP_DIR: /var/www/orbit
      CONTAINER: orbit

    steps:
      - name: Go to app directory
        shell: bash
        run: |
          echo "Switching to $APP_DIR"
          cd "$APP_DIR"

      - name: Pull latest code
        shell: bash
        run: |
          set -e
          cd "$APP_DIR"
          git fetch --all
          git reset --hard origin/main
          git clean -fd

      - name: Install PHP dependencies
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "composer install --no-interaction --prefer-dist --optimize-autoloader"

      - name: Install Node dependencies
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "npm ci"

      - name: Build frontend assets
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "npm run build"

      - name: Run database migrations
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "php artisan migrate --force"

      - name: Optimize Laravel
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "php artisan optimize"

      - name: Deploy finished
        run: echo "Deploy done!"
