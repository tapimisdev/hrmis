name: Deploy Production (Local)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, orbit2]

    env:
      CONTAINER: orbit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust repo directory for git
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install PHP dependencies
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader"

      - name: Install Node dependencies
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "cd /var/www/html && npm ci"

      - name: Build frontend assets
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "cd /var/www/html && npm run build"

      - name: Run database migrations
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "cd /var/www/html && php artisan migrate --force"

      - name: Optimize Laravel
        shell: bash
        run: |
          docker exec $CONTAINER bash -lc "cd /var/www/html && php artisan optimize"

      - name: Deploy finished
        run: echo "Deploy done!"
