name: Deploy Production (Local)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, orbit2]

    env:
      APP_DIR: /var/www/orbit
      CONTAINER: orbit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for GitHub (deploy key)
        shell: bash
        run: |
          set -euo pipefail

          # Make sure deploy key exists
          test -f /root/.ssh/orbit_deploy_key || (echo "Missing /root/.ssh/orbit_deploy_key" && exit 1)

          # SSH permissions (strict)
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/orbit_deploy_key

          # Ensure known_hosts has github.com (no prompt in CI)
          if [ ! -f /root/.ssh/known_hosts ]; then
            ssh-keyscan -H github.com > /root/.ssh/known_hosts
          else
            grep -q "github.com" /root/.ssh/known_hosts || ssh-keyscan -H github.com >> /root/.ssh/known_hosts
          fi
          chmod 644 /root/.ssh/known_hosts

          # Force git to use this key (no dependency on /root/.ssh/config)
          git config --global core.sshCommand "ssh -i /root/.ssh/orbit_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts"

      - name: Switch origin to SSH (workspace)
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin main

      - name: Update live code (reset to origin/main)
        shell: bash
        run: |
          set -euo pipefail

          # Validate live dir is a git repo
          test -d "$APP_DIR/.git" || (echo "ERROR: $APP_DIR is not a git repo (missing .git)" && exit 1)

          git config --global --add safe.directory "$APP_DIR"
          cd "$APP_DIR"

          git remote set-url origin git@github.com:${{ github.repository }}.git
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Install PHP dependencies
        shell: bash
        run: |
          docker exec "$CONTAINER" bash -lc "cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader"

      - name: Install Node dependencies
        shell: bash
        run: |
          docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm ci"

      - name: Build frontend assets
        shell: bash
        run: |
          docker exec "$CONTAINER" bash -lc "cd /var/www/html && npm run build"

      - name: Run database migrations
        shell: bash
        run: |
          docker exec "$CONTAINER" bash -lc "cd /var/www/html && php artisan migrate --force"

      - name: Optimize Laravel
        shell: bash
        run: |
          docker exec "$CONTAINER" bash -lc "cd /var/www/html && php artisan optimize:clear"

      - name: Deploy finished
        shell: bash
        run: echo "Deploy done!"
